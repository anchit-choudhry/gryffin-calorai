# pnpm v11 configuration
# All non-auth settings belong here (not .npmrc) per pnpm v11 conventions.
# https://pnpm.io/settings

# ── Supply-chain & Security ──────────────────────────────────────────────────

# Delay installing newly-published package versions.
# Default is 1440 min (1 day); 10080 = 7 days gives the community more time to
# detect and pull a compromised release before it lands in your tree.
minimumReleaseAge: 10080

# Ownership-change / provenance downgrade protection.
# "no-downgrade" fails the install if a package's trust level drops vs. any
# earlier version - the clearest signal that an account was hijacked and a
# new, less-trusted publisher pushed a malicious release.
# trustPolicyIgnoreAfter: ~1,460,000 min ≈ 1,000 days, which covers packages
# published before npm Provenance went GA (Oct 2023); without this exemption
# those old-but-safe packages would block installs.
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 1460000

# Blocks packages with non-standard/exotic registries (e.g., GitHub raw URLs, tarball links).
# Helps prevent supply-chain attacks via unconventional distribution channels; forces all
# dependencies to come from npm or whitelisted registries.
blockExoticSubdeps: true

# Dependency resolution overrides
# Forces packages depending on reselect@5.1.1 to use 5.1.0 instead
overrides:
  react-redux: "9.1.0"
  reselect: "5.1.0"

# Build-script allowlist - no packages in this project need postinstall
# scripts, so the list stays empty. strictDepBuilds: true (pnpm v11 default)
# means any new dep that tries to run a build script will hard-fail until
# you add it here after manual review.
# Never set dangerouslyAllowAllBuilds: true.
# allowBuilds:
#   esbuild: true   # example: add only after reviewing the script
