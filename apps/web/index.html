<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link href="/scarlet-gryffin.jpg" rel="icon" type="image/jpeg"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <!-- CSP fallback for environments that cannot set HTTP response headers (e.g. GitHub Pages).
       frame-ancestors is intentionally absent: browsers ignore it in <meta> tags per W3C spec.
       frame-ancestors 'none', X-Frame-Options, Referrer-Policy, and Permissions-Policy
       are enforced via HTTP headers in vite.config.ts (dev/preview) and public/_headers
       (Netlify / Cloudflare Pages production). -->
  <meta
    content="default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://lh3.googleusercontent.com; font-src 'self'; connect-src 'self' https://corsproxy.io https://accounts.google.com http://localhost:8080; worker-src 'self'; frame-src https://accounts.google.com; base-uri 'self'; form-action 'self';"
    http-equiv="Content-Security-Policy"/>
  <title>Gryffin Calorai</title>
  <meta name="description" content="Offline-first nutrition and calorie tracker. No accounts, no cloud - your data stays local."/>
  <!-- PWA theme color: two entries let the browser match the OS color scheme before JS runs -->
  <meta name="theme-color" content="#E8E0D5" media="(prefers-color-scheme: light)"/>
  <meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)"/>
  <!-- iOS standalone chrome (Safari ignores the W3C manifest for home-screen apps) -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Calorai"/>
  <link rel="apple-touch-icon" href="/scarlet-gryffin.jpg"/>
  <!-- Android Chrome: opt in to standalone mode without requiring the manifest prompt -->
  <meta name="mobile-web-app-capable" content="yes"/>
</head>
<body>
<div id="app"></div>
<script src="/src/main.tsx" type="module"></script>
</body>
</html>
